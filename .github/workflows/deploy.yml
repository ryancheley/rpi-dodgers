name: Deploy to Raspberry Pi

# Pushes the code to the Pi (Tailscale host "livingroom") on every merge to
# main. Also runnable on demand from the Actions tab.
on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-pi
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Connect to Tailscale
        uses: tailscale/github-action@v3
        with:
          oauth-client-id: ${{ secrets.TS_OAUTH_CLIENT_ID }}
          oauth-secret: ${{ secrets.TS_OAUTH_SECRET }}
          tags: tag:ci
          # Accept MagicDNS so the "livingroom" hostname resolves on the runner.
          args: --accept-dns=true

      # Requires Tailscale SSH enabled on the Pi and an ACL allowing tag:ci to
      # SSH as user "ryan". --delete keeps the Pi in sync with main; the
      # excludes protect runtime-only files that don't live in the repo.
      - name: Rsync to Pi
        run: |
          rsync -az --delete \
            --exclude '.git' \
            --exclude '.github' \
            --exclude '.venv' \
            --exclude '__pycache__' \
            --exclude '.env' \
            -e "ssh -o StrictHostKeyChecking=accept-new" \
            ./ ryan@livingroom:/home/ryan/Documents/rpi-dodgers/
